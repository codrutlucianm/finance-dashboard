name: CI

# Triggers: when to run this workflow
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # Job 1: check Python backend
  backend:
    runs-on: ubuntu-latest
    steps:
      # Checkout the repository code
      - uses: actions/checkout@v4

      # Set up correct Python version
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Install project dependencies
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      # Lint: check code style and errors with ruff
      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check backend/

    # Job 2: check React frontend
  frontend:
    runs-on: ubuntu-latest
    steps:
      # Checkout the repository code
      - uses: actions/checkout@v4

      # Set up the correct Node version
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      # Install dependencies and try to build the app
      - name: Install & build
        run: |
          cd frontend
          npm install
          npm run build
